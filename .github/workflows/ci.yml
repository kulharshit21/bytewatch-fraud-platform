name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,api,producer,stream-worker,runtime,trainer]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/analyst-console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/analyst-console/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  compose-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: docker compose config
